# ── General ──────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1              # start windows at 1 instead of 0
setw -g pane-base-index 1        # start panes at 1 too
set -g renumber-windows on       # renumber when a window is closed
# set -g detach-on-destroy off     # don't exit tmux when closing a session
set -g history-limit 50000       # scrollback buffer

# ── Terminal colors ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Status bar position ──────────────────────────────────────────────
set -g status-position top       # keeps it separate from neovim statusline

# ── Catppuccin theme ─────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'

# Window tabs: show index + name (e.g. "1: zsh", "2: nvim", "3: lazygit")
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Date/time format
set -g @catppuccin_date_time_text "%H:%M"

# Status module styling
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"

# ── Plugins ──────────────────────────────────────────────────────────
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'

# ── Initialize TPM ───────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ── Status bar (AFTER plugin load) ───────────────────────────────────
set -g status-right-length 100
set -g status-left-length 100

# Left: session name
set -g status-left "#{E:@catppuccin_status_session}"

# Right: host → directory → application
set -g  status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_application}"